<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Визуализация данных</title>
        <link rel="stylesheet" href="CSS/style.css">
        <script src="http://d3js.org/d3.v7.min.js"> </script>
        <script src="JavaScript/data.js"></script>
        <script src="JavaScript/main.js"></script>
        <script src="JavaScript/table.js"></script>
        <script src="JavaScript/chart.js"></script>
    </head>
    <body>
        <h3>Список самых высоких зданий</h3>
        <form id="chartForm">
            <div>
                <p>Значение по оси OX</p>
                <label for="countryCheck"><input type="radio" name="ox" value="Страна" checked>Страна</label><br>
                <label for="yearCheck"><input type="radio" name="ox" value="Год">Год</label>
            </div>
            <div>
                <p>Значение по оси OY</p>
                <label for="maxHeightCheck"><input type="checkbox" name="oy" value="1" checked>Максимальная высота</label><br>
                <label for="minHeightCheck"><input type="checkbox" name="oy" value="0">Минимальная высота</label>
            </div>
            <div>
                <p>Тип графика
                    <select id="chartTypeSelect">
                        <option value="1">Точечная диаграмма</option>
                        <option value="2">Гистограмма</option>
                    </select>
                </p>
            </div>
            <div>
                <button id="createChartBtn">Построить</button>
            </div>
        </form>
        <p id="error"></p>
        <svg></svg>
        <button id="hideTableBtn">Скрыть таблицу</button>
        <table id="build"> </table>
    </body>
</html>
